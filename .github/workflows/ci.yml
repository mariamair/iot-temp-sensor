name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_lint_client:
        description: "Lint client code"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    env:
      REGISTRY: ghcr.io/${{ github.repository }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build client image
        run: |
          docker build \
            -t $REGISTRY/client:${IMAGE_TAG} \
            -t $REGISTRY/client:main \
            -t $REGISTRY/client:latest \
            client
      
      - name: Push client image to GHCR
        run: |
          docker push $REGISTRY/client:${IMAGE_TAG}
          docker push $REGISTRY/client:main
          docker push $REGISTRY/client:latest

  lint-client:
    name: Lint Client
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_lint_client != 'false' }}
    needs: build 
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install dependencies
        run: npm ci --prefix client

      - name: Debug
        run: |
          cat package.json
          ./node_modules/.bin/next --version
        working-directory: client

      - name: Run ESLint
        run: ./node_modules/.bin/eslint ./src
        working-directory: client

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, lint-client]
    if: |
      always() &&
      (needs.build.result == 'success') &&
      (needs.lint-client.result == 'success' || needs.lint-client.result == 'skipped')
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
      PRODUCTION_HOST_USER: ${{ secrets.PRODUCTION_HOST_USER }}
      PRODUCTION_HOST_DEPLOY_PATH: ${{ secrets.PRODUCTION_HOST_DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up SSH
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openssh-client   
          eval "$(ssh-agent -s)"
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $PRODUCTION_HOST >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
    
      - name: Ensure deploy path exists
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            $PRODUCTION_HOST_USER@$PRODUCTION_HOST \
            "mkdir -p $PRODUCTION_HOST_DEPLOY_PATH"
      
      - name: Copy docker-compose files to server
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            docker-compose.yml \
            $PRODUCTION_HOST_USER@$PRODUCTION_HOST:$PRODUCTION_HOST_DEPLOY_PATH/

      - name: Pull and Deploy Docker Image via SSH
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            $PRODUCTION_HOST_USER@$PRODUCTION_HOST << EOF
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull ghcr.io/${{ github.repository }}/client:${{ github.sha }}
            docker logout ghcr.io
            cd $PRODUCTION_HOST_DEPLOY_PATH
            docker compose -p iot \
            -f docker-compose.yml \
            up -d client
            exit
          EOF
